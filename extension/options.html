<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Repo Reality Check — Settings</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
    max-width: 560px;
    margin: 2rem auto;
    padding: 0 1rem;
    color: #1f2328;
    background: #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    body { color: #f0f6fc; background: #0d1117; }
    input { background: #151b23; color: #f0f6fc; border-color: #3d444d !important; }
    .hint { color: #9198a1 !important; }
  }
  h1 { font-size: 20px; }
  label { display: block; font-weight: 600; margin: 1.25rem 0 0.25rem; }
  input {
    width: 100%;
    padding: 6px 10px;
    font-size: 14px;
    border: 1px solid #d1d9e0;
    border-radius: 6px;
    box-sizing: border-box;
  }
  .hint { font-size: 12px; color: #59636e; margin-top: 4px; }
  button {
    margin-top: 1.25rem;
    padding: 6px 16px;
    font-size: 14px;
    font-weight: 600;
    color: #ffffff;
    background: #1f883d;
    border: 1px solid rgba(31, 35, 40, 0.15);
    border-radius: 6px;
    cursor: pointer;
  }
  button:hover { background: #1a7f37; }
  #status { margin-left: 10px; font-size: 13px; color: #1a7f37; }
</style>
</head>
<body>
<h1>Repo Reality Check — Settings</h1>

<label for="token">GitHub personal access token (optional)</label>
<input type="password" id="token" placeholder="ghp_… or github_pat_…" autocomplete="off">
<p class="hint">
  Raises the API rate limit from 60 to 5,000 requests/hour. A classic token with
  no scopes (public repos only) is enough. Stored locally in your browser.
</p>

<label for="license">Pro license key</label>
<input type="text" id="license" placeholder="RRC-XXXX-XXXX-XXXX" autocomplete="off">
<p class="hint">Saved for later — Pro features are not active yet.</p>

<button id="save">Save</button><span id="status"></span>

<script src="options.js"></script>
</body>
</html>
